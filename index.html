<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wildu Partner Hub</title>

  <link rel="apple-touch-icon" href="iconpart.png">
  <link rel="icon" type="image/png" href="iconpart.png">
  <link rel="manifest" href="manifest.json">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body, html { 
      margin: 0; padding: 0; height: 100%; 
      background-color: #121212; 
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .portal-card {
      padding: 40px 20px;
      max-width: 400px;
      width: 90%;
    }

    .logo-container {
      margin-bottom: 30px;
    }

    .logo-container img {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-weight: 900;
      font-size: 1.8rem;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    p {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .btn-enter {
      display: inline-block;
      background: #0d6efd;
      color: white;
      text-decoration: none;
      font-weight: 800;
      padding: 20px 40px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 15px 30px rgba(13,110,253,0.3);
      transition: 0.3s;
      width: 100%;
      box-sizing: border-box;
    }

    .btn-enter:hover {
      transform: translateY(-3px);
      background: #0b5ed7;
      box-shadow: 0 20px 40px rgba(13,110,253,0.4);
    }

    .install-hint {
      margin-top: 50px;
      font-size: 0.75rem;
      color: #444;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="portal-card">
    <div class="logo-container">
      <img src="iconpart.png" alt="Wildu Logo">
    </div>
    
    <h1>WILDU <span style="color:#0d6efd">PARTNER</span></h1>
    <p>Benvenuto nel Pannello Proposte.<br>Clicca qui sotto per gestire i tuoi eventi.</p>

    <a href="https://script.google.com/macros/s/AKfycbwFi51ubZmKRe9krW4GnCm9NOLWRODyaTuIUWh3hf7wlBNBCNAtedXNtFGHbIZE8oQ5hQ/exec" 
       target="_blank" 
       rel="noopener noreferrer" 
       class="btn-enter">
       🚀 Entra nel Pannello
    </a>

    <div class="install-hint">Partner Hub v2.0</div>
  </div>

</body>
</html>
